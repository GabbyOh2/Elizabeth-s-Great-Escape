<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My GBA Game Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .gallery-container {
            max-width: 1200px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            text-align: center;
            color: #a8dadc;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .game-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.15);
        }
        
        .game-card.selected {
            border: 2px solid #4ecdc4;
            background: rgba(78,205,196,0.1);
        }
        
        .game-title {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .game-description {
            color: #ccc;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .game-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .tag {
            background: rgba(78,205,196,0.3);
            color: #4ecdc4;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        
        .player-container {
            background: #2a2a3e;
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
            display: none;
        }
        
        .player-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .gameboy-frame {
            background: #8b8c8f;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            max-width: 500px;
            margin: 0 auto;
        }
        
        .screen-container {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        canvas {
            display: block;
            width: 100%;
            max-width: 480px;
            height: auto;
            margin: 0 auto;
            border-radius: 5px;
            background: #000;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button {
            background: #4ecdc4;
            border: none;
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
