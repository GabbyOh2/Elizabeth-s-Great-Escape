<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Play My GBA Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .gameboy-container {
            background: linear-gradient(145deg, #8b8c8f 0%, #6b6c6f 100%);
            border-radius: 35px;
            padding: 25px 20px 20px 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .screen-bezel {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 12px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        
        canvas {
            display: block;
            width: 480px;
            height: 320px;
            margin: 0 auto;
            border-radius: 5px;
            background: #000;
            box-shadow: 0 0 0 2px #4a4a4a;
        }
        
        .button-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 0 10px;
        }
        
        .dpad {
            width: 100px;
            height: 100px;
            position: relative;
        }
        
        .dpad-button {
            position: absolute;
            background: #3a3a3a;
            border-radius: 8px;
            box-shadow: 0 3px 0 #1a1a1a;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
        }
        
        .action-btn {
            background: #5a5a5a;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #ddd;
            box-shadow: 0 4px 0 #2a2a2a;
        }
        
        .action-btn.a { background: #e74c3c; color: white; }
        .action-btn.b { background: #3498db; color: white; }
        
        .label {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            font-size: 12px;
        }
        
        @media (max-width: 600px) {
            canvas {
                width: 100%;
                height: auto;
            }
            .gameboy-container {
                padding: 15px;
                margin: 10px;
            }
            .button-area {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="gameboy-container">
        <div class="screen-bezel">
            <canvas id="gbaCanvas" width="240" height="160"></canvas>
        </div>
        <div class="button-area">
            <div class="dpad">
                <div style="position: relative; width: 80px; height: 80px; background: #3a3a3a; border-radius: 50%; box-shadow: 0 3px 0 #1a1a1a;">
                    <div style="position: absolute; top: 50%; left: 0; right: 0; height: 25px; background: #4a4a4a; transform: translateY(-50%);"></div>
                    <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 25px; background: #4a4a4a; transform: translateX(-50%);"></div>
                </div>
            </div>
            <div class="action-buttons">
                <div class="action-btn b">B</div>
                <div class="action-btn a">A</div>
            </div>
        </div>
        <div class="label">Game Boy Advance</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gbajs2@latest/gbajs2.min.js"></script>
    
    <script>
        var canvas = document.getElementById('gbaCanvas');
        
        var gba = new GBAJS2();
        gba.setCanvas(canvas);
        
        fetch('my_project.gba')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Game file not found. Make sure your .gba file is in the same folder as this HTML file.');
                }
                return response.arrayBuffer();
            })
            .then(data => {
                gba.loadROM(new Uint8Array(data));
                gba.start();
                console.log('Game loaded successfully!');
            })
            .catch(error => {
                console.error('Error loading game:', error);
                document.body.innerHTML += '<div style="position:fixed; bottom:10px; left:10px; color:red; background:white; padding:10px;">Error: ' + error.message + '</div>';
            });
        
        // Keyboard controls (optional - for testing on computer)
        document.addEventListener('keydown', function(e) {
            switch(e.key) {
                case 'ArrowUp': gba.keyPress(0x40); break;
                case 'ArrowDown': gba.keyPress(0x80); break;
                case 'ArrowLeft': gba.keyPress(0x20); break;
                case 'ArrowRight': gba.keyPress(0x10); break;
                case 'z': case 'Z': gba.keyPress(0x01); break; // A button
                case 'x': case 'X': gba.keyPress(0x02); break; // B button
                case 'Enter': gba.keyPress(0x08); break; // Start
                case 'Shift': gba.keyPress(0x04); break; // Select
            }
        });
        
        document.addEventListener('keyup', function(e) {
            switch(e.key) {
                case 'ArrowUp': gba.keyRelease(0x40); break;
                case 'ArrowDown': gba.keyRelease(0x80); break;
                case 'ArrowLeft': gba.keyRelease(0x20); break;
                case 'ArrowRight': gba.keyRelease(0x10); break;
                case 'z': case 'Z': gba.keyRelease(0x01); break;
                case 'x': case 'X': gba.keyRelease(0x02); break;
                case 'Enter': gba.keyRelease(0x08); break;
                case 'Shift': gba.keyRelease(0x04); break;
            }
        });
    </script>
</body>
</html>
