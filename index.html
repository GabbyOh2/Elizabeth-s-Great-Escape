<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play My GBA Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        
        .game-container {
            text-align: center;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }
        
        .info {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        
        .controls-info {
            margin-top: 10px;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gbaCanvas" width="240" height="160"></canvas>
        <div class="info">Game Boy Advance Game</div>
        <div class="controls-info">
            Arrow Keys = D-Pad | Z = A | X = B | Enter = Start
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gbajs2@latest/gbajs2.min.js"></script>
    
    <script>
        var canvas = document.getElementById('gbaCanvas');
        
        var gba = new GBAJS2();
        gba.setCanvas(canvas);
        
        var gameFile = 'my_project.gba';
        
        fetch(gameFile)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Game file not found: ' + gameFile);
                }
                return response.arrayBuffer();
            })
            .then(data => {
                gba.loadROM(new Uint8Array(data));
                gba.start();
                console.log('Game loaded!');
            })
            .catch(error => {
                console.error('Error:', error);
                document.body.innerHTML += '<div style="position:fixed; bottom:10px; left:10px; color:red; background:black; padding:8px;">Error: ' + error.message + '</div>';
            });
        
        document.addEventListener('keydown', function(e) {
            switch(e.key) {
                case 'ArrowUp': gba.keyPress(0x40); break;
                case 'ArrowDown': gba.keyPress(0x80); break;
                case 'ArrowLeft': gba.keyPress(0x20); break;
                case 'ArrowRight': gba.keyPress(0x10); break;
                case 'z': case 'Z': gba.keyPress(0x01); break;
                case 'x': case 'X': gba.keyPress(0x02); break;
                case 'Enter': gba.keyPress(0x08); break;
                case 'Shift': gba.keyPress(0x04); break;
            }
            e.preventDefault();
        });
        
        document.addEventListener('keyup', function(e) {
            switch(e.key) {
                case 'ArrowUp': gba.keyRelease(0x40); break;
                case 'ArrowDown': gba.keyRelease(0x80); break;
                case 'ArrowLeft': gba.keyRelease(0x20); break;
                case 'ArrowRight': gba.keyRelease(0x10); break;
                case 'z': case 'Z': gba.keyRelease(0x01); break;
                case 'x': case 'X': gba.keyRelease(0x02); break;
                case 'Enter': gba.keyRelease(0x08); break;
                case 'Shift': gba.keyRelease(0x04); break;
            }
        });
    </script>
</body>
</html>
