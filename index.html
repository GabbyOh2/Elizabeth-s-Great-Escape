<html>
    <head>
        <!--HTML file auto generated using EmulatorJS codehelper-->
        <style>
            body, html {
                margin: 0;
                padding: 0;
            }
        </style>
    </head>
    <body>
        <div style="width:100%;height:100%;max-width:100%">
            <div id="game"></div>
        </div>
        <script>
            EJS_player = "#game";
            EJS_core = "gba";
            EJS_gameName = "Elizabeth's Great Escape";
            EJS_color = "#61289a";
            EJS_startOnLoaded = true;
            EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            EJS_gameUrl = "my_project.gba";
        </script>
        <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
        <script>

    setTimeout(() => {
        const canvas = document.querySelector('canvas');
        if (canvas) {
         
            let msg = document.createElement('div');
            msg.innerText = '🎮 Click or press any key to load!';
            msg.style.position = 'absolute';
            msg.style.top = '50%';
            msg.style.left = '50%';
            msg.style.transform = 'translate(-50%, -50%)';
            msg.style.background = 'rgba(0,0,0,0.85)';
            msg.style.color = 'white';
            msg.style.padding = '12px 24px';
            msg.style.borderRadius = '30px';
            msg.style.fontFamily = 'Arial, sans-serif';
            msg.style.fontSize = '16px';
            msg.style.zIndex = '1000';
            msg.style.pointerEvents = 'none';
            msg.style.border = '2px solid #61289a';
            msg.style.boxShadow = '0 0 15px rgba(97,40,154,0.5)';
            
            canvas.parentElement.style.position = 'relative';
            canvas.parentElement.appendChild(msg);
            
            
            function startGame() {
                if (msg && msg.parentElement) {
                    msg.remove();
                }
            
                canvas.focus();
              
                if (typeof EJS_startGame === 'function') {
                    EJS_startGame();
                }
            }
            
            canvas.addEventListener('click', startGame, { once: true });
            
            window.addEventListener('keydown', function onAnyKey(e) {
                window.removeEventListener('keydown', onAnyKey);
                startGame();
            });
        }
    }, 1000);
</script>
    </body>
</html>
